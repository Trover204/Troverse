<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* ══════════════════════════
   PAGE 1 — SKILLS
══════════════════════════ */
#p1 {
   flex-direction: column;
   padding: 85px 60px 50px;
   align-items: flex-start;
   justify-content: center;
}

.sk-grid {
   display: grid;
   grid-template-columns: repeat(3, 1fr);
   gap: 12px;
   width: 100%;
}

.sk-card {
   background: var(--card);
   border: 1px solid var(--border);
   border-radius: 14px;
   padding: 18px 20px;
   display: flex;
   flex-direction: column;
   gap: 10px;
   transition: all .3s cubic-bezier(.16, 1, .3, 1);
   position: relative;
   overflow: hidden;
}

.sk-card::before {
   content: '';
   position: absolute;
   top: 0;
   left: 0;
   right: 0;
   height: 2px;
   background: linear-gradient(90deg, var(--c1), var(--c2));
   transform: scaleX(0);
   transform-origin: left;
   transition: transform .4s;
}

.sk-card:hover {
   border-color: rgba(124, 106, 247, .3);
   transform: translateY(-4px);
}

.sk-card:hover::before {
   transform: scaleX(1);
}

.sk-top {
   display: flex;
   align-items: center;
   justify-content: space-between;
}

.sk-icon {
   font-size: 22px;
}

.sk-pct {
   font-family: 'Syne', sans-serif;
   font-size: 17px;
   font-weight: 800;
   color: var(--c1);
}

.sk-name {
   font-size: 13px;
   font-weight: 600;
}

.sk-bar-bg {
   height: 3px;
   background: rgba(255, 255, 255, .06);
   border-radius: 999px;
   overflow: hidden;
}

.sk-bar {
   height: 100%;
   border-radius: 999px;
   background: linear-gradient(90deg, var(--c1), var(--c2));
   width: 0;
   transition: width 1.6s cubic-bezier(.16, 1, .3, 1);
}

.softskills {
   display: flex;
   flex-wrap: wrap;
   gap: 8px;
   margin-top: 20px;
}

.sskill {
   display: inline-flex;
   align-items: center;
   gap: 6px;
   padding: 6px 14px;
   border-radius: 8px;
   background: rgba(56, 189, 248, .07);
   border: 1px solid rgba(56, 189, 248, .15);
   font-size: 12px;
   color: var(--c3);
}

.sskill::before {
   content: '✦';
   font-size: 10px;
}
    </style>
</head>

<body>
    <div class="section" id="p1">
        <div class="p-eyebrow">02 — Kỹ năng</div>
        <h2 class="p-title">Công nghệ & <span style="color:var(--c1)">Kỹ năng</span></h2>
        <div class="sk-grid">
            <div class="sk-card">
                <div class="sk-top"><span class="sk-icon"></span><span class="sk-pct">90%</span></div>
                <div class="sk-name">HTML5</div>
                <div class="sk-bar-bg">
                    <div class="sk-bar" data-w="90"></div>
                </div>
            </div>
            <div class="sk-card">
                <div class="sk-top"><span class="sk-icon"></span><span class="sk-pct">85%</span></div>
                <div class="sk-name">CSS3</div>
                <div class="sk-bar-bg">
                    <div class="sk-bar" data-w="85"></div>
                </div>
            </div>
            <div class="sk-card">
                <div class="sk-top"><span class="sk-icon"></span><span class="sk-pct">90%</span></div>
                <div class="sk-name">Bootstrap</div>
                <div class="sk-bar-bg">
                    <div class="sk-bar" data-w="90"></div>
                </div>
            </div>
            <div class="sk-card">
                <div class="sk-top"><span class="sk-icon"></span><span class="sk-pct">75%</span></div>
                <div class="sk-name">JavaScript</div>
                <div class="sk-bar-bg">
                    <div class="sk-bar" data-w="75"></div>
                </div>
            </div>
            <div class="sk-card">
                <div class="sk-top"><span class="sk-icon"></span><span class="sk-pct">80%</span></div>
                <div class="sk-name">PHP & Laravel</div>
                <div class="sk-bar-bg">
                    <div class="sk-bar" data-w="80"></div>
                </div>
            </div>
            <div class="sk-card">
                <div class="sk-top"><span class="sk-icon"></span><span class="sk-pct">85%</span></div>
                <div class="sk-name">Java</div>
                <div class="sk-bar-bg">
                    <div class="sk-bar" data-w="85"></div>
                </div>
            </div>
            <div class="sk-card">
                <div class="sk-top"><span class="sk-icon"></span><span class="sk-pct">85%</span></div>
                <div class="sk-name">MySQL</div>
                <div class="sk-bar-bg">
                    <div class="sk-bar" data-w="85"></div>
                </div>
            </div>
            <div class="sk-card">
                <div class="sk-top"><span class="sk-icon"></span><span class="sk-pct">80%</span></div>
                <div class="sk-name">Git & GitHub</div>
                <div class="sk-bar-bg">
                    <div class="sk-bar" data-w="80"></div>
                </div>
            </div>
        </div>
       
    </div>
</body>

</html>
