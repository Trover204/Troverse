<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #hero {
            position: relative;
            min-height: 100vh;
            overflow: hidden;
        }

        .hero-container {
            position: relative;
            z-index: 2;

            max-width: 1400px;
            margin: 0 auto;
            padding: 0 8%;

            min-height: 100vh;

            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 80px;
        }

        .hero-content {
            flex: 1;
        }

        .hero-card {
            position: relative;

            width: 340px;
            height: 420px;

            display: flex;
            align-items: center;
            justify-content: center;

            border-radius: 32px;
        }

        .hero-card-glow {
            position: absolute;
            inset: 0;

            border-radius: 32px;

            background:
                linear-gradient(135deg,
                    #ff00ff,
                    #8b5cf6,
                    #2563eb);

            padding: 4px;

            -webkit-mask:
                linear-gradient(#fff 0 0) content-box,
                linear-gradient(#fff 0 0);

            -webkit-mask-composite: xor;
            mask-composite: exclude;

            box-shadow:
                0 0 25px #ff00ff,
                0 0 50px #8b5cf6;
        }

        .hero-card-img {
            width: 100%;
            height: 100%;

            object-fit: cover;

            border-radius: 28px;

            position: relative;
            z-index: 2;
        }

        .hero-card::before {
            content: "";

            position: absolute;

            width: 250px;
            height: 250px;

            background: #ff00ff;
            filter: blur(120px);

            opacity: 0.3;

            z-index: -1;
        }
    </style>
</head>

<body>
    <section id="hero">
        <canvas id="galaxy-canvas"></canvas>

        <div class="hero-container">
            <!-- Left -->
            <div class="hero-content">
                <h1 class="hero-title">
                    Welcome to the<br><em>Troverse</em>
                </h1>

                <p class="hero-subtitle">
                    Your stories build our universe
                </p>

                <div class="hero-scroll">
                    <div class="hero-scroll-line"></div>
                    Scroll to explore
                </div>
            </div>

            <!-- Right -->
            <div class="hero-card">
                <div class="hero-card-glow"></div>

                <img src="public/images/ship1.png" alt="Troverse Avatar" class="hero-card-img" />
            </div>
        </div>
    </section>
</body>

</html>
